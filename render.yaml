services:
  - type: web
    name: worldcup-predictor
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python -u -m worldcup_predictor.web_server
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.15"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: API_FOOTBALL_KEY
        sync: false
      - key: API_FOOTBALL_RETRIES
        value: "3"
      - key: WORLDCUP_PUBLIC_MODE
        value: "true"
      - key: WORLDCUP_ACCESS_USER
        value: viewer
      - key: WORLDCUP_ACCESS_PASSWORD
        sync: false
      - key: WORLDCUP_DB_PATH
        value: /opt/render/project/src/storage/worldcup_predictor.sqlite3
      - key: WORLDCUP_DATA_CACHE_DIR
        value: /opt/render/project/src/storage/api_cache
      - key: WORLDCUP_DATA_CACHE_ENABLED
        value: "true"
      - key: WORLDCUP_MODEL_VALIDATION_CACHE_SECONDS
        value: "300"
      - key: WORLDCUP_AUTO_SETTLEMENT_ENABLED
        value: "true"
      - key: WORLDCUP_AUTO_SETTLEMENT_INTERVAL_SECONDS
        value: "300"
      - key: WORLDCUP_WEB_BATCH_DEFAULT_LIMIT
        value: "10"
      - key: WORLDCUP_WEB_BATCH_LIMIT
        value: "30"
    disk:
      name: worldcup-storage
      mountPath: /opt/render/project/src/storage
      sizeGB: 1
